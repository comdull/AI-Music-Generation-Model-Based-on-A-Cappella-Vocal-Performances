<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI 音乐生成 Demo</title>
</head>
<body>
  <h1>AI 音乐生成 Demo</h1>

  <form id="upload-form">
    <label>音频文件 (.wav):</label>
    <input type="file" name="audio_file" accept=".wav" required /><br><br>

    <label>歌词文件 (.txt):</label>
    <input type="file" name="lyrics_file" accept=".txt" required /><br><br>

    <button type="submit">生成多轨 MIDI</button>
  </form>

  <h3>结果:</h3>
  <pre id="result"></pre>
  <div id="download-link"></div>

  <script>
    const form = document.getElementById("upload-form");
    const result = document.getElementById("result");
    const downloadDiv = document.getElementById("download-link");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      result.textContent = "生成中...";

      try {
        const response = await fetch("http://192.168.188.220:8000/generate_full_pipeline/", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        console.log(data);

        if (data.error) {
          result.textContent = "出错: " + data.error;
          downloadDiv.innerHTML = "";
        } else {
          result.textContent = `
            ✅ 生成成功！
            情感标签: ${data.sentiment_analysis.label}
            置信度: ${data.sentiment_analysis.confidence}
          `;

          const downloadUrl = "http://192.168.188.220:8000" + data.output_file;

          downloadDiv.innerHTML = `
            <a href="${downloadUrl}" download>
              点击这里下载生成的 MIDI 文件
            </a>
          `;
        }
      } catch (err) {
        result.textContent = "请求失败: " + err;
        downloadDiv.innerHTML = "";
      }
    });
  </script>
</body>
</html>
